schema = 1

[wrapper]
language = "cpp"
template_version = "0.0.0"

[runtime]
engine = "native"
version = "c++20"

[run]
entrypoint = ["bot"]
source_dir = "user/src"

[submit]
include = [
  "CMakeLists.txt",
  "user/src"
]
exclude = [
  "build/**",
  "cmake-build-*/**",
  "out/**"
]

[notes]
summary = "Build the project with CMake, then run the generated bot executable."
