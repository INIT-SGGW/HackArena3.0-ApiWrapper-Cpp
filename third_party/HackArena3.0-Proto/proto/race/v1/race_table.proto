syntax = "proto3";

package race.v1;

option csharp_namespace = "HA3.Proto.Race.V1";

// Running sandbox target for race table query.
message SandboxRaceTableTarget {
  // Target active sandbox identifier.
  string sandbox_id = 1;

}

// Official race target for race table query.
message OfficialRaceTableTarget {
}

// Explicit race-table source target.
message RaceTableTarget {
  // Exactly one target must be set.
  oneof target {
    SandboxRaceTableTarget sandbox = 1;
    OfficialRaceTableTarget official_race = 2;
  }

}

// Identity for bots in running sandbox tables.
message LocalBotIdentity {
  // Stable local user identifier.
  string user_id = 1;
  // Display username of participant who runs the bot.
  string username = 2;
  // Stable bot ordinal index in sandbox context.
  uint32 bot_index = 3;

}

// Identity for official race team entries.
message TeamIdentity {
  // Stable team identifier.
  string team_id = 1;
  // Display team name.
  string team_name = 2;

}

// Race table row status.
enum RaceTableEntryStatus {
  RACE_TABLE_ENTRY_STATUS_UNSPECIFIED = 0;
  RACE_TABLE_ENTRY_STATUS_ACTIVE = 1;
  RACE_TABLE_ENTRY_STATUS_DNF = 2;
}

// Single sandbox race table row.
message SandboxRaceTableEntry {
  // Vehicle identifier represented by this table row.
  uint64 car_id = 1;
  // Identity used in sandbox table.
  oneof identity {
    LocalBotIdentity local_bot = 2;
    TeamIdentity team = 3;
  }

}

// Single official race table row.
message OfficialRaceTableEntry {
    // Vehicle identifier represented by this table row.
  uint64 car_id = 1;
  // Official race rows always use team identity.
  TeamIdentity team = 2;
  // 1-based position in table ordering.
  uint32 position = 3;
  // Time gap to current leader in milliseconds.
  optional uint32 gap_to_leader_ms = 4;
  // Number of laps behind leader.
  uint32 laps_behind = 5;
  // True when entry vehicle is currently in pit.
  bool in_pit = 6;
  // Official race row status.
  RaceTableEntryStatus status = 7;

}

// Full sandbox race table snapshot.
// Rows are sorted by sandbox join time (oldest first).
message SandboxRaceTableSnapshot {
  // Source target used to produce this snapshot.
  SandboxRaceTableTarget target = 1;
  repeated SandboxRaceTableEntry entries = 2;

}

// Full official race table snapshot.
// Rows are sorted by backend classification:
// - ACTIVE rows first (more completed laps first, then farther progress on current lap),
// - then DNF rows.
// Position field must match row order.
message OfficialRaceTableSnapshot {
  // Source target used to produce this snapshot.
  OfficialRaceTableTarget target = 1;
  repeated OfficialRaceTableEntry entries = 2;

}

// Full race table snapshot.
message RaceTableSnapshot {
  // Exactly one snapshot shape must be set.
  oneof snapshot {
    SandboxRaceTableSnapshot sandbox = 1;
    OfficialRaceTableSnapshot official_race = 2;
  }

}

// Request for current race table snapshot.
message GetRaceTableRequest {
  // Required source target.
  RaceTableTarget target = 1;

}

// Response with current race table snapshot.
message GetRaceTableResponse {
  RaceTableSnapshot snapshot = 1;

}

// Stream request for race table updates.
message StreamRaceTableRequest {
  // Required source target.
  RaceTableTarget target = 1;

}

// Stream event carrying a full race table snapshot.
message RaceTableEvent {
  RaceTableSnapshot snapshot = 1;

}

// Response envelope for race table stream updates.
message StreamRaceTableResponse {
  RaceTableEvent event = 1;

}

// Query API for race table snapshots.
service RaceTableQueryService {
  // Returns current full race table snapshot.
  rpc GetRaceTable(GetRaceTableRequest) returns (GetRaceTableResponse);
  // Streams full race table snapshots when table state changes.
  rpc StreamRaceTable(StreamRaceTableRequest) returns (stream StreamRaceTableResponse);
}
