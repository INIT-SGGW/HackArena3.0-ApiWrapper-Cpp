syntax = "proto3";

package race.v1;

import "google/protobuf/timestamp.proto";

import "race/v1/runtime_settings.proto";

option csharp_namespace = "HA3.Proto.Race.V1";

// Admin request to schedule sandbox activation/deactivation.
message ScheduleSandboxActivationRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // true = activate target sandbox, false = deactivate target sandbox.
  bool activate = 2;
  // Target sandbox identifier for activation/deactivation operation.
  string sandbox_id = 3;
  // Optional execution time in UTC.
  // If unset, change is applied immediately.
  // At most one pending operation can exist per sandbox_id.
  // Scheduling again for same sandbox_id replaces previous pending operation.
  google.protobuf.Timestamp effective_at_utc = 4;

}

// Scheduled activation/deactivation response.
message ScheduleSandboxActivationResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // true = target sandbox will be active, false = target sandbox will be inactive.
  bool activate = 2;
  // Target sandbox identifier for activation/deactivation operation.
  string sandbox_id = 3;
  // UTC timestamp when change becomes effective.
  google.protobuf.Timestamp effective_at_utc = 4;

}

// Admin request to cancel pending sandbox activation/deactivation schedule.
message CancelSandboxActivationScheduleRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target sandbox identifier whose pending operation should be canceled.
  string sandbox_id = 2;

}

// Cancel pending sandbox activation/deactivation schedule response.
message CancelSandboxActivationScheduleResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Target sandbox identifier.
  string sandbox_id = 2;
  // true if a pending operation existed and was canceled.
  bool canceled = 3;

}

// Active sandbox runtime details (admin view).
message AdminSandboxRuntimeInfo {
  // Active sandbox identifier.
  string sandbox_id = 1;
  // Active sandbox display name.
  string sandbox_name = 2;
  // Active sandbox map identifier.
  string map_id = 3;
  // Active in-session time-of-day preset.
  RuntimeTimeOfDayPreset active_time_of_day_preset = 4;
  // Active ghost mode behavior.
  GhostModeSettings ghost_mode = 5;
  // UTC timestamp when sandbox session started.
  google.protobuf.Timestamp started_at_utc = 6;
  // Planned close timestamp if shutdown is scheduled.
  google.protobuf.Timestamp closes_at_utc = 7;

}

// Pending sandbox activation/deactivation operation (admin view).
message AdminPendingSandboxOperation {
  // At most one pending entry can exist for each sandbox_id.
  // true = activate sandbox, false = deactivate sandbox.
  bool activate = 1;
  // Target sandbox identifier for activation operation.
  string sandbox_id = 2;
  // UTC timestamp when pending operation will execute.
  google.protobuf.Timestamp execute_at_utc = 3;

}

// Admin runtime data for sandbox activity mode.
message AdminSandboxRuntimeMode {
  // Active sandboxes for sandbox activity mode.
  repeated AdminSandboxRuntimeInfo sandboxes = 1;
  // Pending sandbox activation/deactivation operations.
  // Max one entry per sandbox_id.
  repeated AdminPendingSandboxOperation pending_sandbox_operations = 2;

}

// Admin view of official race staging phase.
message AdminOfficialRaceStagingState {
  // Number of participants ready to start.
  uint32 ready_player_count = 1;
  // Total number of participants expected to join this race.
  uint32 expected_player_count = 2;

}

// Admin view of official race countdown phase.
message AdminOfficialRaceCountdownState {
  // UTC timestamp when countdown ends and race enters running phase.
  google.protobuf.Timestamp countdown_end_at_utc = 1;

}

// Admin view of official race running phase.
message AdminOfficialRaceRunningState {
  // Planned UTC datetime when running phase should end.
  google.protobuf.Timestamp planned_end_at_utc = 1;

}

// Admin view of official race finished phase.
message AdminOfficialRaceFinishedState {
}

// Admin view of official race aborted phase.
message AdminOfficialRaceAbortedState {
}

// Active official race runtime details (admin view).
message AdminOfficialRaceRuntimeInfo {
  // Active official race identifier.
  string race_id = 1;
  // Active official race display name.
  string race_name = 2;
  // Active official race map identifier.
  string map_id = 3;
  // Scheduled UTC datetime when this race entered staging phase.
  google.protobuf.Timestamp start_time_utc = 4;
  // Configured race duration in seconds, counted from running phase start.
  uint32 race_duration_sec = 5;
  // Current official race phase details.
  oneof phase_state {
    // Staging phase details.
    AdminOfficialRaceStagingState staging = 6;
    // Countdown phase details.
    AdminOfficialRaceCountdownState countdown = 7;
    // Running phase details.
    AdminOfficialRaceRunningState running = 8;
    // Finished phase details.
    AdminOfficialRaceFinishedState finished = 9;
    // Aborted phase details.
    AdminOfficialRaceAbortedState aborted = 10;
  }

}

// Runtime state of activity mode and active sandboxes (admin view).
message AdminRuntimeState {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Server UTC timestamp.
  google.protobuf.Timestamp server_time_utc = 5;
  // Active runtime mode.
  // If unset, server is in technical break (none activity).
  oneof active_mode {
    // Official race runtime mode.
    AdminOfficialRaceRuntimeInfo official_race = 6;
    // Sandbox runtime mode.
    AdminSandboxRuntimeMode sandbox_mode = 7;
  }

}

// Request current runtime state (admin/internal).
message GetAdminRuntimeStateRequest {
}

// Response with current runtime state (admin/internal).
message GetAdminRuntimeStateResponse {
  // Current runtime state snapshot.
  AdminRuntimeState state = 1;

}

// Admin request to start official race countdown.
message StartOfficialRaceCountdownRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target active official race identifier.
  string race_id = 2;
  // Countdown duration in seconds.
  // Can be used only when active race state is staging.
  uint32 countdown_seconds = 3;

}

// Official race countdown start response.
message StartOfficialRaceCountdownResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Target active official race identifier.
  string race_id = 2;
  // UTC timestamp when countdown ends and race enters running phase.
  google.protobuf.Timestamp countdown_end_at_utc = 3;

}

// Admin request to close ended official race session.
message CloseOfficialRaceSessionRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target active official race identifier.
  // Can be used only when active race state is finished or aborted.
  string race_id = 2;

}

// Official race session close response.
message CloseOfficialRaceSessionResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Closed official race identifier.
  string race_id = 2;

}

// Admin request to abort running official race session.
message AbortOfficialRaceRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target active official race identifier.
  // Can be used only when active race state is running.
  string race_id = 2;

}

// Official race abort response.
message AbortOfficialRaceResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Aborted official race identifier.
  string race_id = 2;

}

// Admin API for runtime controls.
service RuntimeAdminService {
  // Schedules sandbox activation/deactivation.
  rpc ScheduleSandboxActivation(ScheduleSandboxActivationRequest) returns (ScheduleSandboxActivationResponse);
  // Cancels pending activation/deactivation schedule for target sandbox.
  rpc CancelSandboxActivationSchedule(CancelSandboxActivationScheduleRequest) returns (CancelSandboxActivationScheduleResponse);
  // Starts countdown for active official race in staging phase.
  rpc StartOfficialRaceCountdown(StartOfficialRaceCountdownRequest) returns (StartOfficialRaceCountdownResponse);
  // Aborts running official race session.
  rpc AbortOfficialRace(AbortOfficialRaceRequest) returns (AbortOfficialRaceResponse);
  // Closes ended official race session (finished or aborted).
  rpc CloseOfficialRaceSession(CloseOfficialRaceSessionRequest) returns (CloseOfficialRaceSessionResponse);
  // Returns current runtime activity state (admin/internal).
  rpc GetAdminRuntimeState(GetAdminRuntimeStateRequest) returns (GetAdminRuntimeStateResponse);
}
