syntax = "proto3";

package race.v1;

import "google/protobuf/timestamp.proto";

import "race/v1/runtime_settings.proto";

option csharp_namespace = "HA3.Proto.Race.V1";

// Rule used to assign teams to start slots.
enum StartPlacementMode {
  // Default/unknown value.
  START_PLACEMENT_MODE_UNSPECIFIED = 0;
  // Randomized start order when race starts.
  START_PLACEMENT_MODE_RANDOM = 1;
  // Start order follows current scoreboard (higher points first).
  START_PLACEMENT_MODE_SCOREBOARD = 2;
  // Start order follows reverse scoreboard (higher points last).
  START_PLACEMENT_MODE_REVERSED_SCOREBOARD = 3;
}

// In-game time-of-day preset used for race configuration.
enum RaceTimeOfDayPreset {
  // Default/unknown value.
  RACE_TIME_OF_DAY_PRESET_UNSPECIFIED = 0;
  // Morning lighting preset.
  RACE_TIME_OF_DAY_PRESET_MORNING = 1;
  // Noon lighting preset.
  RACE_TIME_OF_DAY_PRESET_NOON = 2;
  // Evening lighting preset.
  RACE_TIME_OF_DAY_PRESET_EVENING = 3;
  // Night lighting preset.
  RACE_TIME_OF_DAY_PRESET_NIGHT = 4;
}

// Admin-provided sandbox configuration payload.
message SandboxConfigInput {
  // Human-readable sandbox name shown in frontend.
  string sandbox_name = 1;
  // Track/map identifier used by sandbox simulation.
  string map_id = 2;
  // Default in-game time-of-day preset for this sandbox.
  RuntimeTimeOfDayPreset time_of_day_preset = 3;
  // Ghost mode behavior.
  GhostModeSettings ghost_mode = 4;

}

// Persisted sandbox configuration entry with backend-assigned identifier.
message SandboxConfig {
  // Stable sandbox identifier.
  string sandbox_id = 1;
  // User-provided sandbox configuration fields.
  SandboxConfigInput config = 2;

}

// Request for persisted sandbox configuration list.
message GetSandboxConfigsRequest {
}

// Response with persisted sandbox configuration list.
message GetSandboxConfigsResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Configured sandboxes.
  repeated SandboxConfig sandboxes = 2;

}

// Create single sandbox configuration entry.
message CreateSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // New sandbox configuration payload.
  SandboxConfigInput config = 2;

}

// Created sandbox configuration entry.
message CreateSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Created sandbox configuration entry.
  SandboxConfig sandbox = 2;

}

// Update single sandbox configuration entry.
message UpdateSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target sandbox identifier to update.
  string sandbox_id = 2;
  // New sandbox configuration payload.
  SandboxConfigInput config = 3;

}

// Updated sandbox configuration entry.
message UpdateSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Updated sandbox configuration entry.
  SandboxConfig sandbox = 2;

}

// Delete single sandbox configuration entry.
message DeleteSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target sandbox identifier to delete.
  string sandbox_id = 2;

}

// Delete confirmation.
message DeleteSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Deleted sandbox identifier.
  string sandbox_id = 2;

}

// Admin request for time-of-day preset update in sandbox configuration.
message UpdateSandboxTimeOfDayRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target sandbox identifier.
  string sandbox_id = 2;
  // New default in-game time-of-day preset for target sandbox.
  RuntimeTimeOfDayPreset preset = 3;

}

// Time-of-day preset update response.
message UpdateSandboxTimeOfDayResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Target sandbox identifier.
  string sandbox_id = 2;
  // Updated default in-game time-of-day preset.
  RuntimeTimeOfDayPreset preset = 3;
  // UTC timestamp when configuration update was applied.
  google.protobuf.Timestamp applied_at_utc = 4;
  // true if update was also applied to currently active runtime sandbox instance.
  bool applied_to_active_runtime = 5;

}

// Race configuration payload provided by admin tools.
message RaceConfigInput {
  // Human-readable race name shown in frontend.
  string race_name = 1;
  // UTC datetime when backend automatically enters staging phase for this race.
  google.protobuf.Timestamp start_time_utc = 2;
  // Race duration in seconds, counted from running phase start.
  uint32 race_duration_sec = 3;
  // Track/map identifier used by race simulation.
  string map_id = 4;
  // Team start placement policy.
  StartPlacementMode start_placement_mode = 5;
  // Fixed points multiplier.
  float points_multiplier_fixed = 6;
  // In-game time-of-day preset.
  RaceTimeOfDayPreset time_of_day_preset = 7;

}

// Persisted race configuration entry with backend-assigned identifier.
message RaceConfig {
  // Stable race identifier.
  string race_id = 1;
  // User-provided race configuration fields.
  RaceConfigInput config = 2;

}

// Request for persisted race configuration schedule.
message GetRaceConfigsRequest {
}

// Response with persisted race configuration schedule.
message GetRaceConfigsResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Entries should be sorted by start_time_utc ascending and have unique race_id.
  repeated RaceConfig races = 2;

}

// Create single race configuration entry.
message CreateRaceConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // New race configuration payload.
  RaceConfigInput config = 2;

}

// Created race configuration entry.
message CreateRaceConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Created race configuration entry.
  RaceConfig race = 2;

}

// Update single race configuration entry.
message UpdateRaceConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target race identifier to update.
  string race_id = 2;
  // New race configuration payload.
  // Active race cannot be updated.
  RaceConfigInput config = 3;

}

// Updated race configuration entry.
message UpdateRaceConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Updated race configuration entry.
  RaceConfig race = 2;

}

// Delete single race configuration entry.
message DeleteRaceConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // Target race identifier to delete.
  // Active race cannot be deleted.
  string race_id = 2;

}

// Delete confirmation.
message DeleteRaceConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  // Deleted race identifier.
  string race_id = 2;

}

// Admin API for sandbox configuration management.
service SandboxConfigAdminService {
  // Returns persisted sandbox configuration list.
  rpc GetSandboxConfigs(GetSandboxConfigsRequest) returns (GetSandboxConfigsResponse);
  // Creates single sandbox configuration entry.
  rpc CreateSandboxConfig(CreateSandboxConfigRequest) returns (CreateSandboxConfigResponse);
  // Updates single sandbox configuration entry.
  rpc UpdateSandboxConfig(UpdateSandboxConfigRequest) returns (UpdateSandboxConfigResponse);
  // Deletes single sandbox configuration entry.
  rpc DeleteSandboxConfig(DeleteSandboxConfigRequest) returns (DeleteSandboxConfigResponse);
  // Updates sandbox default time-of-day preset and applies it if sandbox is active.
  rpc UpdateSandboxTimeOfDay(UpdateSandboxTimeOfDayRequest) returns (UpdateSandboxTimeOfDayResponse);
}

// Admin API for race configuration management.
service RaceConfigAdminService {
  // Returns persisted race configuration schedule.
  rpc GetRaceConfigs(GetRaceConfigsRequest) returns (GetRaceConfigsResponse);
  // Creates single race configuration entry.
  rpc CreateRaceConfig(CreateRaceConfigRequest) returns (CreateRaceConfigResponse);
  // Updates single race configuration entry.
  rpc UpdateRaceConfig(UpdateRaceConfigRequest) returns (UpdateRaceConfigResponse);
  // Deletes single race configuration entry.
  rpc DeleteRaceConfig(DeleteRaceConfigRequest) returns (DeleteRaceConfigResponse);
}
