syntax = "proto3";

package race.v1;

import "google/protobuf/timestamp.proto";

import "race/v1/runtime_settings.proto";
import "weather/v1/weather.proto";

option csharp_namespace = "HA3.Proto.Race.V1";

// Local sandbox time-of-day resolution mode.
enum LocalTimeOfDayMode {
  LOCAL_TIME_OF_DAY_MODE_UNSPECIFIED = 0;
  // Use fixed_preset from LocalTimeOfDaySettings.
  LOCAL_TIME_OF_DAY_MODE_FIXED_PRESET = 1;
  // Resolve preset from backend local system time.
  LOCAL_TIME_OF_DAY_MODE_AUTO_BY_LOCAL_TIME = 2;
}

// Local sandbox spawn mode used by local backend sessions.
enum LocalSandboxSpawnMode {
  LOCAL_SANDBOX_SPAWN_MODE_UNSPECIFIED = 0;
  // Spawn at start-line position.
  LOCAL_SANDBOX_SPAWN_MODE_START_LINE = 1;
  // Spawn at random point on track.
  LOCAL_SANDBOX_SPAWN_MODE_RANDOM_ON_TRACK = 2;
  // Spawn inside pit area.
  LOCAL_SANDBOX_SPAWN_MODE_IN_PIT = 3;
  // Spawn at random start slot (from predefined start-grid slots).
  LOCAL_SANDBOX_SPAWN_MODE_RANDOM_START_SLOT = 4;
}

// Local sandbox time-of-day settings.
message LocalTimeOfDaySettings {
  LocalTimeOfDayMode mode = 1;
  // Used when mode is LOCAL_TIME_OF_DAY_MODE_FIXED_PRESET.
  RuntimeTimeOfDayPreset fixed_preset = 2;

}

// Local sandbox weather settings.
message LocalWeatherSettings {
  weather.v1.WeatherType weather_type = 1;
  // Air temperature in Celsius degrees.
  int32 temperature_c = 2;

}

// Local sandbox configuration payload.
message LocalSandboxConfigInput {
  // Human-readable sandbox name shown in frontend.
  string sandbox_name = 1;
  // Track/map identifier used by sandbox simulation.
  string map_id = 2;
  LocalTimeOfDaySettings time_of_day = 3;
  GhostModeSettings ghost_mode = 4;
  LocalWeatherSettings weather = 5;
  LocalSandboxSpawnMode spawn_mode = 6;

}

// Persisted local sandbox configuration entry.
message LocalSandboxConfig {
  // Stable sandbox identifier.
  string sandbox_id = 1;
  LocalSandboxConfigInput config = 2;

}

// Active local sandbox runtime details.
message LocalActiveSandboxRuntimeInfo {
  string sandbox_id = 1;
  string sandbox_name = 2;
  string map_id = 3;
  // Currently resolved in-session time-of-day preset.
  RuntimeTimeOfDayPreset active_time_of_day_preset = 4;
  LocalTimeOfDaySettings time_of_day = 5;
  GhostModeSettings ghost_mode = 6;
  LocalWeatherSettings weather = 7;
  LocalSandboxSpawnMode spawn_mode = 8;
  google.protobuf.Timestamp started_at_utc = 9;
  uint32 active_player_count = 10;

}

// Local runtime state snapshot.
message LocalRuntimeState {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  // Server UTC timestamp.
  google.protobuf.Timestamp server_time_utc = 2;
  repeated LocalActiveSandboxRuntimeInfo active_sandboxes = 3;

}

// Request for persisted local sandbox configuration list.
message GetLocalSandboxConfigsRequest {
}

// Response with persisted local sandbox configuration list.
message GetLocalSandboxConfigsResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  repeated LocalSandboxConfig sandboxes = 2;

}

// Create single local sandbox configuration entry.
message CreateLocalSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  LocalSandboxConfigInput config = 2;

}

// Created local sandbox configuration entry.
message CreateLocalSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  LocalSandboxConfig sandbox = 2;

}

// Update single local sandbox configuration entry.
message UpdateLocalSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  string sandbox_id = 2;
  // Active sandbox cannot be updated with full config replacement.
  LocalSandboxConfigInput config = 3;

}

// Updated local sandbox configuration entry.
message UpdateLocalSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  LocalSandboxConfig sandbox = 2;

}

// Delete single local sandbox configuration entry.
message DeleteLocalSandboxConfigRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  string sandbox_id = 2;

}

// Delete local sandbox configuration confirmation.
message DeleteLocalSandboxConfigResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  string sandbox_id = 2;

}

// Update local sandbox time-of-day settings.
message UpdateLocalSandboxTimeOfDayRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  string sandbox_id = 2;
  LocalTimeOfDaySettings time_of_day = 3;

}

// Time-of-day settings update response.
message UpdateLocalSandboxTimeOfDayResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  string sandbox_id = 2;
  LocalTimeOfDaySettings time_of_day = 3;

}

// Update local sandbox weather settings.
message UpdateLocalSandboxWeatherRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  string sandbox_id = 2;
  LocalWeatherSettings weather = 3;

}

// Weather settings update response.
message UpdateLocalSandboxWeatherResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  string sandbox_id = 2;
  LocalWeatherSettings weather = 3;

}

// Update local sandbox spawn mode.
message UpdateLocalSandboxSpawnModeRequest {
  // Must match current config revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  string sandbox_id = 2;
  LocalSandboxSpawnMode spawn_mode = 3;

}

// Spawn mode update response.
message UpdateLocalSandboxSpawnModeResponse {
  // Monotonic config revision used for optimistic concurrency.
  uint64 revision = 1;
  string sandbox_id = 2;
  LocalSandboxSpawnMode spawn_mode = 3;

}

// Immediate local sandbox activation/deactivation request.
message SetLocalSandboxActivationRequest {
  // Must match current runtime revision, otherwise request is rejected.
  uint64 expected_revision = 1;
  // true = activate target sandbox immediately, false = deactivate immediately.
  bool activate = 2;
  string sandbox_id = 3;

}

// Immediate local sandbox activation/deactivation response.
message SetLocalSandboxActivationResponse {
  // Monotonic runtime revision used for optimistic concurrency.
  uint64 revision = 1;
  bool activate = 2;
  string sandbox_id = 3;

}

// Request current local runtime state.
message GetLocalRuntimeStateRequest {
}

// Response with current local runtime state snapshot.
message GetLocalRuntimeStateResponse {
  LocalRuntimeState state = 1;

}

// Stream request for local runtime state updates.
message StreamLocalRuntimeStateRequest {
}

// Stream response with local runtime state snapshot.
message StreamLocalRuntimeStateResponse {
  LocalRuntimeState state = 1;

}

// Admin API for local-only sandbox configuration and runtime controls.
service LocalSandboxAdminService {
  // Returns persisted local sandbox configuration list.
  rpc GetLocalSandboxConfigs(GetLocalSandboxConfigsRequest) returns (GetLocalSandboxConfigsResponse);
  // Creates single local sandbox configuration entry.
  rpc CreateLocalSandboxConfig(CreateLocalSandboxConfigRequest) returns (CreateLocalSandboxConfigResponse);
  // Updates single local sandbox configuration entry (inactive sandboxes only).
  rpc UpdateLocalSandboxConfig(UpdateLocalSandboxConfigRequest) returns (UpdateLocalSandboxConfigResponse);
  // Deletes single local sandbox configuration entry.
  rpc DeleteLocalSandboxConfig(DeleteLocalSandboxConfigRequest) returns (DeleteLocalSandboxConfigResponse);
  // Updates local sandbox time-of-day settings and applies them if sandbox is active.
  rpc UpdateLocalSandboxTimeOfDay(UpdateLocalSandboxTimeOfDayRequest) returns (UpdateLocalSandboxTimeOfDayResponse);
  // Updates local sandbox weather settings and applies them if sandbox is active.
  rpc UpdateLocalSandboxWeather(UpdateLocalSandboxWeatherRequest) returns (UpdateLocalSandboxWeatherResponse);
  // Updates local sandbox spawn mode and applies it if sandbox is active.
  rpc UpdateLocalSandboxSpawnMode(UpdateLocalSandboxSpawnModeRequest) returns (UpdateLocalSandboxSpawnModeResponse);
  // Immediately activates/deactivates selected local sandbox.
  rpc SetLocalSandboxActivation(SetLocalSandboxActivationRequest) returns (SetLocalSandboxActivationResponse);
  // Returns current local runtime state.
  rpc GetLocalRuntimeState(GetLocalRuntimeStateRequest) returns (GetLocalRuntimeStateResponse);
  // Streams local runtime state: first event is full snapshot, then state changes.
  rpc StreamLocalRuntimeState(StreamLocalRuntimeStateRequest) returns (stream StreamLocalRuntimeStateResponse);
}
