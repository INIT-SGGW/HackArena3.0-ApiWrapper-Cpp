syntax = "proto3";

package auth.v1;

import "auth/v1/game_token.proto";

option csharp_namespace = "HA3.Proto.Auth.V1";

// JWK "use" values for game token signing keys.
enum JwkKeyUse {
  JWK_KEY_USE_UNSPECIFIED = 0;
  JWK_KEY_USE_SIG = 1;
}

// JWK "kty" values supported by game token JWKS.
enum JwkKeyType {
  JWK_KEY_TYPE_UNSPECIFIED = 0;
  JWK_KEY_TYPE_EC = 1;
}

// JWK "crv" values supported by game token JWKS.
enum JwkEcCurve {
  JWK_EC_CURVE_UNSPECIFIED = 0;
  JWK_EC_CURVE_P256 = 1;
}

// Public JWK entry used for verifying game tokens.
message GameTokenJwk {
  JwkKeyUse use = 1;
  JwkKeyType kty = 2;
  // JWK key identifier ("kid").
  string kid = 3;
  JwkEcCurve crv = 4;
  // JWT/JWK algorithm for this key, for example ES256.
  JwtAlgorithm alg = 5;
  // EC public key X coordinate encoded as base64url (RFC 7517).
  string x = 6;
  // EC public key Y coordinate encoded as base64url (RFC 7517).
  string y = 7;
}

// Request for public game-token JWKS.
message GetGameTokenJwksRequest {}

// Public game-token JWKS payload.
message GetGameTokenJwksResponse {
  repeated GameTokenJwk keys = 1;
}

// Auth API for exposing public keys used to verify issued game tokens.
service GameTokenJwksService {
  // Returns the current JWKS used for game-token signature verification.
  rpc GetGameTokenJwks(GetGameTokenJwksRequest) returns (GetGameTokenJwksResponse);
}
