syntax = "proto3";

package auth.v1;

import "auth/v1/game_token.proto";

option csharp_namespace = "HA3.Proto.Auth.V1";

// Requested game token type.
enum GameTokenIssueType {
  GAME_TOKEN_ISSUE_TYPE_UNSPECIFIED = 0;
  GAME_TOKEN_ISSUE_TYPE_TEAM_BOT = 1;
  GAME_TOKEN_ISSUE_TYPE_TEAM_BOT_DEV = 2;
  GAME_TOKEN_ISSUE_TYPE_SPECTATOR = 3;
  GAME_TOKEN_ISSUE_TYPE_TEAM_SPECTATOR = 4;
  GAME_TOKEN_ISSUE_TYPE_TEAM_DEV_SPECTATOR = 5;
}

// Game token issue request.
message IssueGameTokenRequest {
  // Requested token type.
  GameTokenIssueType token_type = 1;
  
}

// Generic token issue response.
message IssueGameTokenResponse {
  SignedGameToken token = 1;

}

// Auth API for issuing game tokens.
service GameTokenIssuerService {
  // Issues requested game token for HA3.
  // Context resolution rules:
  // - user_id comes from verified auth transport context.
  // - for team token types, server resolves HA3 team_id for user.
  // - exactly one HA3 team is required for team token types.
  // - for TEAM_BOT_DEV, server generates random instance_uuid per issued token.
  // Expected errors:
  // - UNAUTHENTICATED: missing or invalid auth context.
  // - INVALID_ARGUMENT: token_type is UNSPECIFIED.
  // - FAILED_PRECONDITION: team token requested and HA3 team lookup returns 0 or >1 teams.
  rpc IssueGameToken(IssueGameTokenRequest) returns (IssueGameTokenResponse);
}
