syntax = "proto3";

package auth.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "HA3.Proto.Auth.V1";

// JWT signing algorithm.
// JWT_ALGORITHM_UNSPECIFIED may indicate unknown or unsupported algorithm value.
enum JwtAlgorithm {
  JWT_ALGORITHM_UNSPECIFIED = 0;
  JWT_ALGORITHM_ES256 = 1;
}

// JWT "typ" header values.
// JWT_TYPE_UNSPECIFIED may indicate unknown or unsupported token type value.
enum JwtType {
  JWT_TYPE_UNSPECIFIED = 0;
  JWT_TYPE_JWT = 1;
}

// Supported game scopes.
// Mapped wire values:
// - TOKEN_SCOPE_RACE_CONTROL -> "race.control"
// - TOKEN_SCOPE_RACE_READ_TEAM -> "race.read.team"
// - TOKEN_SCOPE_RACE_READ_PUBLIC -> "race.read.public"
// - TOKEN_SCOPE_RACE_READ_ALL -> "race.read.all"
// - TOKEN_SCOPE_RACE_TEAM_CONFIGURE -> "race.team.configure"
enum TokenScope {
  TOKEN_SCOPE_UNSPECIFIED = 0;
  TOKEN_SCOPE_RACE_CONTROL = 1;
  TOKEN_SCOPE_RACE_READ_TEAM = 2;
  TOKEN_SCOPE_RACE_READ_PUBLIC = 3;
  TOKEN_SCOPE_RACE_READ_ALL = 4;
  TOKEN_SCOPE_RACE_TEAM_CONFIGURE = 5;
}

// JWT header fields.
message GameTokenHeader {
  JwtAlgorithm alg = 1;
  // JWK key id used for signing.
  string kid = 2;
  JwtType typ = 3;

}

// JWT claims shared by all game-token types.
message TokenStandardClaims {
  // Issuer (iss), for example: "ha3-auth" or "ha3-dev-auth".
  string iss = 1;
  // Audience (aud), for example: "ha3-official" or "ha3-local".
  // JWT allows one or many audiences, so this field is repeated.
  repeated string aud = 2;
  // Subject (sub), UUID whose meaning depends on token type:
  // - team_bot: sub is team_id
  // - team_bot_dev: sub is user_id
  // - spectator: sub is user_id
  // - team_spectator: sub is user_id
  // - team_dev_spectator: sub is user_id
  string sub = 3;
  // Issued-at time in UTC.
  google.protobuf.Timestamp iat_utc = 4;
  // Expiration time in UTC.
  google.protobuf.Timestamp exp_utc = 5;
  // JWT ID (UUID).
  string jti = 6;
  repeated TokenScope scopes = 7;

}

// Team-bot token claims.
message TeamBotTokenClaims {
  TokenStandardClaims standard = 1;
  // Team id claim (UUID). MUST be equal to standard.sub.
  string team_id = 2;

}

// Team-bot development token claims.
message TeamBotDevTokenClaims {
  TokenStandardClaims standard = 1;
  // Team id claim (UUID). For this token type, standard.sub is user_id.
  string team_id = 2;
  // Local runtime instance identifier.
  string instance_uuid = 3;

}

// Global spectator token claims.
message SpectatorTokenClaims {
  TokenStandardClaims standard = 1;

}

// Team spectator token claims.
message TeamSpectatorTokenClaims {
  TokenStandardClaims standard = 1;
  // Team id claim (UUID). For this token type, standard.sub is user_id.
  string team_id = 2;

}

// Team spectator development token claims.
message TeamDevSpectatorTokenClaims {
  TokenStandardClaims standard = 1;
  // Team id claim (UUID). For this token type, standard.sub is user_id.
  string team_id = 2;

}

// Typed game-token claims.
message GameTokenClaims {
  oneof token_type {
    TeamBotTokenClaims team_bot = 1;
    TeamBotDevTokenClaims team_bot_dev = 2;
    SpectatorTokenClaims spectator = 3;
    TeamSpectatorTokenClaims team_spectator = 4;
    TeamDevSpectatorTokenClaims team_dev_spectator = 5;
  }

}

// Issued game token payload.
message SignedGameToken {
  // Compact JWT string encoded as header.payload.signature.
  string jwt = 1;
  // Expiration time copied from exp claim.
  google.protobuf.Timestamp exp_utc = 2;
  // JWK key id copied from header.
  string kid = 3;

}
