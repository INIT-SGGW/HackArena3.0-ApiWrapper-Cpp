syntax = "proto3";

package auth.v1;

import "auth/v1/game_token.proto";

option csharp_namespace = "HA3.Proto.Auth.V1";

// Standardized reason why token is not active.
enum GameTokenInactiveReason {
  GAME_TOKEN_INACTIVE_REASON_UNSPECIFIED = 0;
  GAME_TOKEN_INACTIVE_REASON_MALFORMED = 1;
  GAME_TOKEN_INACTIVE_REASON_INVALID_SIGNATURE = 2;
  GAME_TOKEN_INACTIVE_REASON_EXPIRED = 3;
  GAME_TOKEN_INACTIVE_REASON_NOT_YET_VALID = 4;
  GAME_TOKEN_INACTIVE_REASON_ISSUER_NOT_ALLOWED = 5;
  GAME_TOKEN_INACTIVE_REASON_AUDIENCE_NOT_ALLOWED = 6;
  GAME_TOKEN_INACTIVE_REASON_TOKEN_TYPE_NOT_ALLOWED = 7;
  GAME_TOKEN_INACTIVE_REASON_SCOPE_NOT_ALLOWED = 8;
  GAME_TOKEN_INACTIVE_REASON_REVOKED = 9;
  GAME_TOKEN_INACTIVE_REASON_INTERNAL_ERROR = 10;
}

// Request for token introspection.
message IntrospectGameTokenRequest {
  // Compact JWT string encoded as header.payload.signature.
  string jwt = 1;

}

// Token introspection result.
message IntrospectGameTokenResponse {
  // True if token is valid and currently active.
  bool active = 1;
  // Decoded JWT header. MAY be unset when active == false.
  GameTokenHeader header = 2;
  // Decoded and typed game claims. MAY be unset when active == false.
  GameTokenClaims claims = 3;
  // Standardized inactive reason.
  // When active == true, inactive_reason MUST be UNSPECIFIED.
  // When active == false, inactive_reason SHOULD be a specific non-UNSPECIFIED reason.
  GameTokenInactiveReason inactive_reason = 4;
  // Debug-only detail for logs/diagnostics; not intended for end users.
  string inactive_reason_debug = 5;

}

// Auth API for validating and decoding game tokens.
service GameTokenIntrospectionService {
  // Validates token signature/claims and returns typed token content.
  rpc IntrospectGameToken(IntrospectGameTokenRequest) returns (IntrospectGameTokenResponse);
}
