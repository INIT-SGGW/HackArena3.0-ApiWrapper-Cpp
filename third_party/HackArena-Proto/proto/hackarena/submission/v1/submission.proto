syntax = "proto3";

package hackarena.submission.v1;

import "hackarena/submission/v1/common.proto";
import "hackarena/submission/v1/upload.proto";

option csharp_namespace = "HackArena.Submission.V1";

// Start build from previously uploaded source.
message StartBuildRequest {
  // Uploaded source identifier from UploadSource.
  string upload_id = 1;
}

// StartBuild result.
message StartBuildResponse {
  // Newly created build.
  BuildSummary build = 1;
}

// Get build by id.
message GetBuildRequest {
  // Build identifier.
  string build_id = 1;
}

// GetBuild result.
message GetBuildResponse {
  // Requested build.
  BuildSummary build = 1;
}

// List latest builds.
message ListBuildsRequest {
  // Maximum number of returned builds.
  uint32 limit = 1;
}

// ListBuilds result.
message ListBuildsResponse {
  // Returned builds.
  repeated BuildSummary builds = 1;
}

// Cancel build by id.
message CancelBuildRequest {
  // Build identifier.
  string build_id = 1;
}

// CancelBuild result.
message CancelBuildResponse {
  // Updated build state.
  BuildSummary build = 1;
}

// CLI/backend submission API.
service SubmissionService {
  // Upload participant source archive.
  rpc UploadSource(stream UploadSourceRequest) returns (UploadSourceResponse);
  // Start build using previously uploaded source.
  rpc StartBuild(StartBuildRequest) returns (StartBuildResponse);
  // Get build by id.
  rpc GetBuild(GetBuildRequest) returns (GetBuildResponse);
  // List latest builds.
  rpc ListBuilds(ListBuildsRequest) returns (ListBuildsResponse);
  // Cancel active or queued build.
  rpc CancelBuild(CancelBuildRequest) returns (CancelBuildResponse);
}
