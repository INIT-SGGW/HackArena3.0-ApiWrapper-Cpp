syntax = "proto3";

package hackarena.submission.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "HackArena.Submission.V1";

// Build lifecycle visible to CLI/backend clients.
enum BuildStatus {
  // Default value.
  BUILD_STATUS_UNSPECIFIED = 0;
  // Build is waiting in queue.
  BUILD_STATUS_QUEUED = 1;
  // Build is currently running.
  BUILD_STATUS_RUNNING = 2;
  // Build finished successfully.
  BUILD_STATUS_SUCCEEDED = 3;
  // Build finished with failure.
  BUILD_STATUS_FAILED = 4;
  // Build was cancelled.
  BUILD_STATUS_CANCELLED = 5;
  // Build exceeded timeout.
  BUILD_STATUS_TIMED_OUT = 6;
}

// High-level failure category.
enum FailureCategory {
  // Default value.
  FAILURE_CATEGORY_UNSPECIFIED = 0;
  // Input artifact error.
  FAILURE_CATEGORY_INPUT = 1;
  // Build execution error.
  FAILURE_CATEGORY_BUILD = 2;
  // Artifact push error.
  FAILURE_CATEGORY_PUSH = 3;
  // Timeout.
  FAILURE_CATEGORY_TIMEOUT = 4;
  // Internal platform error.
  FAILURE_CATEGORY_INTERNAL = 5;
}

// Build failure details.
message BuildFailure {
  // Failure category.
  FailureCategory category = 1;
  // Stable machine-readable code.
  string code = 2;
  // Human-readable message.
  string message = 3;
}

// Build projection used by submission API.
message BuildSummary {
  // Build identifier.
  string build_id = 1;
  // Uploaded source identifier.
  string upload_id = 2;
  // Current build status.
  BuildStatus status = 3;
  // Failure details for failed/cancelled/timed-out builds.
  BuildFailure failure = 4;
  // Built image reference when successful.
  string image_reference = 5;
  // Build timestamps.
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp finished_at = 8;
}
