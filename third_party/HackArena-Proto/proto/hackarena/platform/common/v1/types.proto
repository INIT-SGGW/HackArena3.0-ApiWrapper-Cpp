syntax = "proto3";

package hackarena.platform.common.v1;

option csharp_namespace = "HackArena.Platform.Common.V1";

// UUID wrapper for consistent IDs.
message Uuid {
  // Canonical UUID string.
  string value = 1;

  reserved 2 to 99;
}

// Pagination request parameters.
message PageRequest {
  // Max items to return.
  uint32 page_size = 1;
  // Opaque continuation token.
  string page_token = 2;

  reserved 3 to 49;
}

// Pagination response metadata.
message PageResponse {
  // Token for the next page, if any.
  string next_page_token = 1;

  reserved 2 to 49;
}
