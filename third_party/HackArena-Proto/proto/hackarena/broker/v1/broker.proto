syntax = "proto3";

package hackarena.broker.v1;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "HackArena.Broker.V1";

// Transport type for teammate backend connectivity.
enum EndpointTransport {
  // Default value.
  ENDPOINT_TRANSPORT_UNSPECIFIED = 0;
  // Direct IPv6 connection to teammate host.
  ENDPOINT_TRANSPORT_IPV6_DIRECT = 1;
  // Direct IPv4 connection to teammate host (LAN/VPN).
  ENDPOINT_TRANSPORT_IPV4_LAN_DIRECT = 2;
  // TCP relay connection via broker-managed tunnel.
  ENDPOINT_TRANSPORT_TCP_TUNNEL_RELAY = 3;
}

// Reachable backend endpoint.
message Endpoint {
  // Transport type to use.
  EndpointTransport transport = 1;
  // Hostname or IP address.
  string host = 2;
  // Target port.
  uint32 port = 3;
  // Optional short-lived token used for connection validation.
  string connect_token = 4;
}

// Relay config for host client to establish ssh -R tunnel.
message RelayTunnelConfig {
  // Relay host to connect with SSH.
  string relay_host = 1;
  // Remote relay port to expose.
  uint32 relay_port = 2;
}

// Discoverable backend hosted by a teammate.
message BackendInfo {
  // Unique identifier of the registered backend.
  string backend_id = 1;
  // ID of the user hosting the backend.
  string user_id = 2;
  // Reachable endpoints ordered by preference:
  // IPv6 direct, then IPv4 direct candidates (LAN/VPN), then TCP tunnel relay.
  repeated Endpoint endpoints = 3;
  // Last successful heartbeat timestamp.
  google.protobuf.Timestamp last_seen = 4;
  // Entry validity deadline.
  google.protobuf.Timestamp expires_at = 5;
  // Display name of the user hosting the backend.
  string user_display_name = 6;
}

// Registers local backend network details for discovery.
message RegisterBackendRequest {
  // Candidate IPv4 endpoints (e.g., LAN, VPN).
  repeated string local_ipv4_endpoints = 1;
  // IPv6 address, if available.
  string local_ipv6 = 2;
  // Backend listening port.
  uint32 local_port = 3;
  // Backend runtime secret stored in backend process RAM.
  bytes backend_secret = 4;
}

// Registration result for the hosted backend.
message RegisterBackendResponse {
  // Unique identifier of the registered backend.
  string backend_id = 1;
  // Entry validity deadline refreshed by heartbeats.
  google.protobuf.Timestamp expires_at = 2;
  // Relay data required by host client for ssh -R setup.
  RelayTunnelConfig relay = 3;
}

// Heartbeat for extending backend liveness.
message HeartbeatRequest {
  // Backend entry identifier returned by RegisterBackend.
  string backend_id = 1;
  // Backend runtime secret used for liveness validation.
  bytes backend_secret = 2;
}

// Acknowledges heartbeat acceptance.
message HeartbeatResponse {}

// Empty request; caller identity/team comes from auth context.
message GetTeamBackendsRequest {}

// One-shot snapshot of alive teammate backends.
message GetTeamBackendsResponse {
  repeated BackendInfo backends = 1;
}

// Empty request for backend discovery stream.
message WatchTeamBackendsRequest {}

// Streaming snapshot event with current alive teammate backends.
message WatchTeamBackendsResponse {
  repeated BackendInfo backends = 1;
}

// Service responsible for backend discovery between teammates.
service BrokerService {
  // Registers a locally hosted backend.
  // If the caller already has a backend in the team, it is replaced.
  // local_ipv4_endpoints allows multiple candidate IPv4 addresses.
  rpc RegisterBackend(RegisterBackendRequest) returns (RegisterBackendResponse);
  // Keeps backend entry alive and validates backend_id/backend_secret pair.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // Returns alive teammate backends excluding caller.
  rpc GetTeamBackends(GetTeamBackendsRequest) returns (GetTeamBackendsResponse);
  // Streams full snapshots of alive teammate backends excluding caller.
  rpc WatchTeamBackends(WatchTeamBackendsRequest) returns (stream WatchTeamBackendsResponse);
}
