syntax = "proto3";

package hackarena.connect.v1;

option csharp_namespace = "HackArena.Connect.V1";

// Validation result for pre-game connectivity check.
enum ConnectStatus {
  // Default value.
  CONNECT_STATUS_UNSPECIFIED = 0;
  // Validation accepted.
  CONNECT_STATUS_OK = 1;
  // Requested backend_id does not match connected backend.
  CONNECT_STATUS_BACKEND_MISMATCH = 2;
  // Client protocol version is not supported.
  CONNECT_STATUS_UNSUPPORTED_PROTOCOL = 3;
  // Internal backend error.
  CONNECT_STATUS_INTERNAL_ERROR = 4;
  // Request payload is invalid (e.g., missing required logical fields).
  CONNECT_STATUS_INVALID_ARGUMENT = 5;
}

// Unary request used by frontend/backend before opening game channel (e.g., WebSocket).
message ValidateConnectionRequest {
  // Public backend identifier obtained from broker discovery.
  string backend_id = 1;
  // Client protocol version.
  // For v1 backend should accept only "1".
  string protocol_version = 2;
  // Client-provided nonce for request uniqueness and diagnostics.
  bytes nonce = 3;
}

// Unary response returned by ValidateConnection.
message ValidateConnectionResponse {
  // Validation result.
  ConnectStatus status = 1;
  // Backend identifier returned by backend for explicit verification.
  string backend_id = 2;
  // Optional diagnostic message for logs/UI.
  string message = 3;
  // Echo of request nonce for request/response correlation.
  bytes nonce_echo = 4;
}

// Connect API used by frontend/backend before opening gameplay channel.
service ConnectService {
  // Validates selected backend and protocol compatibility.
  // After CONNECT_STATUS_OK client can open gameplay channel.
  rpc ValidateConnection(ValidateConnectionRequest) returns (ValidateConnectionResponse);
}
